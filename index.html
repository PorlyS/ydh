<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永定河与大兴地貌演化互动动画</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="stage-wrap">
      <canvas id="terrain-canvas"></canvas>
      <svg id="story-svg" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet" aria-label="永定河与大兴互动动画">
        <defs>
          <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="7" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <linearGradient id="riverGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#d8fbff"></stop>
            <stop offset="48%" stop-color="#45b8d7"></stop>
            <stop offset="100%" stop-color="#1976a2"></stop>
          </linearGradient>
          <linearGradient id="plainGradient" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#dfecc8"></stop>
            <stop offset="100%" stop-color="#b8d896"></stop>
          </linearGradient>
        </defs>

        <path id="daxing-shape" class="daxing-shape" d=""></path>
        <g id="plain-layer"></g>
        <g id="sand-layer"></g>
        <g id="wetland-layer"></g>
        <path id="river-shadow" class="river-shadow" d=""></path>
        <path id="river-main" class="river-main" d=""></path>
        <path id="river-light" class="river-light" d=""></path>
        <g id="particle-layer"></g>
        <g id="hotspot-layer"></g>
        <g id="label-layer"></g>
      </svg>

      <div class="stage-top">
        <div class="title-block">
          <span>互动地理动画</span>
          <h1>永定河塑造大兴</h1>
        </div>
        <div class="year-card">
          <span id="era-label">远古冲积期</span>
          <strong id="year-label">约一万年前</strong>
        </div>
      </div>

      <div id="event-card" class="event-card">
        <span id="event-kicker">点击热点</span>
        <h2 id="event-title">让河流自己讲故事</h2>
        <p id="event-text">点击地图上的发光节点，观察永定河如何冲积平原、留下沙地、孕育泉眼，并在后来的历史中连接团河行宫、大兴机场和现代城市。</p>
        <div id="event-tags" class="event-tags"></div>
      </div>

      <div class="hud">
        <button id="play-btn" class="hud-button primary">播放</button>
        <button id="prev-btn" class="hud-button">上一章</button>
        <button id="next-btn" class="hud-button">下一章</button>
        <button id="focus-btn" class="hud-button">聚焦事件</button>
        <button id="effects-btn" class="hud-button active">动画开</button>
        <button id="labels-btn" class="hud-button active">标注开</button>
      </div>

      <div class="progress-panel">
        <div class="progress-head">
          <span>章节时间线</span>
          <strong id="chapter-count">1 / 7</strong>
        </div>
        <input id="time-slider" type="range" min="0" max="6" value="0">
        <div id="timeline" class="timeline"></div>
      </div>

      <div class="mission-panel">
        <span>课堂玩法</span>
        <p id="mission-text">任务：按顺序点亮 7 个事件，解释“河流沉积 - 沙地 - 泉眼 - 皇家园林 - 现代交通”的因果链。</p>
        <div id="score-row" class="score-row"></div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
